# Tiny Tapeout project information
project:
  title:        "6 bit greyscale upscaler"      # Project title
  author:       "Albert"      # Your name
  discord:      ""      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "upscales greyscale images"      # One line description of what your project does
  language:     "Verilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     0       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x1"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_example"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "project.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: "Left pixel grayscale bit 0 (LSB)"
  ui[1]: "Left pixel grayscale bit 1"
  ui[2]: "Left pixel grayscale bit 2"
  ui[3]: "Left pixel grayscale bit 3"
  ui[4]: "Left pixel grayscale bit 4"
  ui[5]: "Left pixel grayscale bit 5 (MSB)"
  ui[6]: "Right pixel grayscale bit 4"
  ui[7]: "Right pixel grayscale bit 5 (MSB)"

  # Outputs
  uo[0]: "Averaged pixel bit 0 (LSB)"
  uo[1]: "Averaged pixel bit 1"
  uo[2]: "Averaged pixel bit 2"
  uo[3]: "Averaged pixel bit 3"
  uo[4]: "Averaged pixel bit 4"
  uo[5]: "Averaged pixel bit 5"
  uo[6]: "Averaged pixel bit 6"
  uo[7]: "Unused (always 0)"

  # Bidirectional pins
  uio[0]: "Right pixel grayscale bit 0 (LSB)"
  uio[1]: "Right pixel grayscale bit 1"
  uio[2]: "Right pixel grayscale bit 2"
  uio[3]: "Right pixel grayscale bit 3"
  uio[4]: "Input valid (valid_i)"
  uio[5]: "Input ready (ready_i)"
  uio[6]: "Output ready (ready_o)"
  uio[7]: "Output valid (valid_o)"  

# Do not change!
yaml_version: 6
